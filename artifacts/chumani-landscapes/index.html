<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Chumani's Landscapes and Irrigation | Cape Town</title>
    <meta name="description" content="Chumani's Landscapes and Irrigation (Pty) Ltd – Professional garden design, irrigation systems, soft & hard landscaping, and garden maintenance in Cape Town, South Africa." />
    <meta name="theme-color" content="#1e4d2b" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Chumani's Landscapes and Irrigation" />
    <meta property="og:description" content="Transforming outdoor spaces into living art. Cape Town's premium landscaping company." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.png" />

    <!-- Preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- Google Fonts — display=swap prevents render-blocking -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&display=swap" rel="stylesheet" />

    <!-- Preload hero image so it paints immediately -->
    <link
      rel="preload"
      as="image"
      href="/images/hero-bg.jpg"
      fetchpriority="high"
    />

    <!-- Preload logo -->
    <link rel="preload" as="image" href="/logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
